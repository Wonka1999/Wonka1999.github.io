    Projects:
      - name: Design of Terminal Deoxynucleotidyl Transferase
        summary: Engineered TdT variants with improved dNTP selectivity and incorporation fidelity through iterative design-in-the-loop optimization, expanding patent-compliant design space for industrial translation.
        highlights:
          - Computational lead
          - Joint Industry–Academia Project
        start_date: 2025-05
        end_date: Present

     - name: Design of Recombinant Human Hyaluronidase
        summary: Engineered rHuPH20 variants with enhanced activity, thermostability, substrate specificity, and reduced immunogenicity through iterative design-in-the-loop optimization, identifying lead candidates beyond patent-constrained sequence space.
        highlights:
          - Computational co-lead
          - Joint Industry–Academia Project
        start_date: 2025-05
        end_date: Present

    - name: High-resolution Functional Annotation of Membrane Transporters
        summary: Engineered rHuPH20 variants with enhanced activity, thermostability, substrate specificity, and reduced immunogenicity through iterative design-in-the-loop optimization, identifying lead candidates beyond patent-constrained sequence space.
        highlights:
          - Computational co-lead
          - Research Project
        start_date: 2025-01
        end_date: Present

    - name: Multimodal Generative Modeling of Protein Function
        summary: Developed CFP-Gen and FuncGen, two novel frameworks that unify protein sequence design through programmable multimodal functional spaces.
        highlights:
          - Computational co-lead
          - Research Project
        start_date: 2024-10
        end_date: Present
        
    - name: Engineering of Industrial Alkaline Protease
        summary: Supported the computational design of Savinase variants via AI-driven iterative mutation optimization, enhancing catalytic activity, thermostability, and washing performance.
        highlights:
          - Computational contributor
          - Joint Industry–Academia Project
        start_date: 2024-03
        end_date: 2025-12

    - name: Multi-objective Engineering of Industrial Phytase
        summary: Co-optimized phytase variants with enhanced catalytic activity and thermostability through AI-driven mutation design in iterative design–build–test cycles beyond patent-constrained sequence space.
        highlights:
          - Computational lead
          - Joint Industry–Academia Project
        start_date: 2024-03
        end_date: Present
        
    - name: AI-guided Evolution and Mechanistic Study of Nitrate Transporters
        summary: Designed transport activity–enhancing AtNRT1.1 variants through iterative ML-guided evolution, validated in vitro and in vivo.
        highlights:
          - Computational lead
          - Research Project
        start_date: 2023-10
        end_date: Present
        
    - name: Co-optimisation of Protein Solubility and Stability
        summary: Utilized ProtT5 and VAE to model an editable latent space of proteins, enabling the generation of variants with enhanced solubility and stability.
        highlights:
          - Computational lead
          - Course Project
        start_date: 2023-01
        end_date: 2023-05

        
