    Projects:
      - name: Design of Terminal Deoxynucleotidyl Transferase (TdT)
        summary: Engineered TdT variants with enhanced selectivity for NH2-modified dNTPs and improved incorporation fidelity through iterative design-in-the-loop optimization, enabling exploration of patent-compliant sequence space for industrial translation. The lead variants exhibited substantial gains in incorporation fidelity across diverse sequence contexts relative to existing patented variants, including those from Zhonghe Gene.
        highlights:
          - Joint Industry–Academia Project
          - Computational Lead
        start_date: "2025/05"
        end_date: Present

      - name: Design of Recombinant Human Hyaluronidase (rHuPH20)
        summary: Engineered rHuPH20 variants with enhanced catalytic activity, thermostability, interference resistance, and reduced immunogenicity through iterative design-in-the-loop optimization, yielding lead candidates beyond patent-constrained sequence space. The best-performing variants showed substantial improvements in both activity and thermostability relative to existing patented variants.
          - Joint Industry–Academia Project
          - Computational Co-lead
        start_date: "2025/05"
        end_date: Present

      - name: High-resolution Functional Annotation of Membrane Transporters
        summary: Developed ConTP for high-resolution functional annotation of membrane transporters, with state-of-the-art performance and strong out-ofdistribution robustness in substrate specificity prediction and TC family classification. ConTP reveals cross-family functional convergence, including sodium transport across distinct TC superfamilies, faithfully reconstructs authentic multi substrate specificity such as in NRAMP transporters, and establishes a quantitative framework for diagnosing substrate fidelity in generative transporter design.
        highlights:
          - Research Project
          - Computational Co-lead
        start_date: "2025/01"
        end_date: Present

      - name: Multimodal Generative Modeling of Protein Function
        summary: Developed CFP-Gen and FuncGen, two novel frameworks that unify protein sequence design through programming multimodal functional spaces. In FuncGen, reference-guided editing, annotation-guided generation, inverse folding, motif scaffolding, secondary-structure manipulation, and evolution-guided design emerge as operational modes of a single model. 
        highlights:
          - Research Project
          - Computational Co-lead
        start_date: "2024/10"
        end_date: Present

      - name: Engineering of Industrial Alkaline Protease
        summary: Supported the computational design of Savinase variants via AI-driven iterative mutation optimization, enhancing catalytic activity, thermostability, and washing performance.
        highlights:
          - Joint Industry–Academia Project
          - Computational Contributor
        start_date: "2024/03"
        end_date: 2025-12

      - name: Multi-objective Engineering of Industrial Phytase
        summary: Co-optimized phytase variants with improved catalytic activity and thermostability through AI-driven mutation design in iterative design–build–test cycles beyond patent-constrained sequence space. The lead variant was successfully commercialized by Bestzyme and is now on the market. A patent application has been filed.
        highlights:
          - Joint Industry–Academia Project
          - Computational Lead
        start_date: "2024/03"
        end_date: Present

      - name: AI-guided Evolution and Mechanistic Study of Nitrate Transporters
        summary: Designed AtNRT1.1 variants with enhanced transport activity through iterative ML-guided evolution, with functional validation in Xenopus laevis oocytes and Arabidopsis. The lead variant, M40, achieved a 700% increase in transport activity, and the AI-identified mutation patterns were transferable to homologs in other crop species, providing a foundation for improving nitrogen use efficiency (NUE).
        highlights:
          - Research Project
          - Computational Lead
        start_date: "2023/10"
        end_date: Present

      - name: Co-optimisation of Protein Solubility and Stability
        summary: Utilized ProtT5 and VAE to model an editable latent space of protein sequences, enabling the generation of variants with enhanced solubility and stability.
        highlights:
          - Course Project
          - Computational Lead
        start_date: "2023/01"
        end_date: "2023/05"
